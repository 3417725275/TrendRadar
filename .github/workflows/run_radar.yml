name: TrendRadar Scheduled Task

# 触发条件配置
on:
  schedule:
    # 定时任务 (Cron 表达式)。注意：GitHub Actions 使用的是 UTC 时间！
    # 下面的例子是 UTC 0:00 和 12:00，换算成北京时间 (UTC+8) 是每天的 8:00 和 20:00
    - cron: '0 0,12 * * *'
  
  # 开启手动触发，方便你随时在网页上点击运行测试
  workflow_dispatch: 

jobs:
  run-task:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 运行环境

    steps:
      # 1. 拉取你的代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 推荐使用 3.10 或项目要求的版本
          cache: 'pip' # 开启 pip 缓存，加快后续运行速度

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行 TrendRadar 脚本
      - name: Run TrendRadar
        env:
          # 在这里将 GitHub Secrets 映射为脚本运行所需的环境变量
          # 根据你实际使用的 AI 和推送平台按需保留或添加
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          # 请确认你的主启动文件名称，如果是 main.py 就保持原样
          python main.py